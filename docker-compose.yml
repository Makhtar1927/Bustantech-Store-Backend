version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: bustantech_redis
    restart: unless-stopped
    # 1. On impose un mot de passe (via le .env) et on désactive les commandes de destruction de base
    command: redis-server --requirepass "${REDIS_PASSWORD}" --rename-command FLUSHALL "" --rename-command FLUSHDB "" --rename-command CONFIG ""
    ports:
      - "127.0.0.1:6379:6379" # 2. Restreint l'accès à localhost UNIQUEMENT
    volumes:
      - redis_cache_data:/data

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: bustantech_redis_commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD} # 3. Connexion de l'UI avec le mot de passe
    ports:
      - "127.0.0.1:8081:8081" # 4. Interface bloquée à localhost
    depends_on:
      - redis

volumes:
  redis_cache_data: